version: 1.0
catalog_name: pptgen_example_deck_catalog
owner: Analytics / DevOps Platform Team

libraries:
  - name: eos
    path: examples/eos
    description: EOS leadership and operating cadence artifacts
    decks:
      - file: eos_scorecard.yaml
        title: EOS Weekly Scorecard
        purpose: Weekly leadership metrics review
        slide_types:
          - title
          - section
          - metric_summary
          - bullets
        recommended_template: ops_review_v1
        audience:
          - leadership
          - operations
      - file: eos_rocks.yaml
        title: EOS Quarterly Rocks
        purpose: Quarterly priorities and accountability review
        slide_types:
          - title
          - section
          - bullets
          - two_column
        recommended_template: ops_review_v1
        audience:
          - leadership
          - management
      - file: eos_issues_list.yaml
        title: EOS Issues List
        purpose: IDS and issue prioritization review
        slide_types:
          - title
          - section
          - bullets
        recommended_template: ops_review_v1
        audience:
          - leadership
          - management
      - file: eos_vto.yaml
        title: EOS Vision / Traction Organizer
        purpose: Vision and strategic direction alignment
        slide_types:
          - title
          - section
          - bullets
          - two_column
        recommended_template: executive_brief_v1
        audience:
          - leadership
          - strategy
      - file: eos_quarterly_review.yaml
        title: EOS Quarterly Review
        purpose: Review traction, lessons learned, and next quarter priorities
        slide_types:
          - title
          - section
          - metric_summary
          - bullets
        recommended_template: executive_brief_v1
        audience:
          - leadership
          - operations

  - name: devops
    path: examples/devops
    description: DevOps Handbook inspired engineering delivery artifacts
    decks:
      - file: devops_three_ways.yaml
        title: DevOps Three Ways
        purpose: Explain foundational DevOps principles
        slide_types:
          - title
          - bullets
        recommended_template: ops_review_v1
        audience:
          - engineering
          - platform
      - file: devops_metrics.yaml
        title: DevOps Performance Metrics
        purpose: Present DORA metrics and delivery performance
        slide_types:
          - title
          - metric_summary
        recommended_template: ops_review_v1
        audience:
          - engineering
          - leadership
      - file: devops_pipeline.yaml
        title: DevOps Deployment Pipeline
        purpose: Explain CI/CD pipeline architecture
        slide_types:
          - title
          - image_caption
        recommended_template: architecture_overview_v1
        audience:
          - engineering
          - architecture
      - file: devops_transformation.yaml
        title: DevOps Transformation Roadmap
        purpose: Present phased transformation plan
        slide_types:
          - title
          - two_column
        recommended_template: executive_brief_v1
        audience:
          - engineering
          - leadership
      - file: devops_experiment_review.yaml
        title: DevOps Experiment Review
        purpose: Summarize improvement experiments and results
        slide_types:
          - title
          - bullets
        recommended_template: ops_review_v1
        audience:
          - engineering
          - platform

  - name: team_topologies
    path: examples/team_topologies
    description: Team Topologies inspired organization and platform team artifacts
    decks:
      - file: team_types.yaml
        title: Team Topologies - Team Types
        purpose: Explain canonical team types
        slide_types:
          - title
          - bullets
