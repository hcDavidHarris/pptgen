deck:
  title: EOS Quarterly Rocks
  template: ops_review_v1
  author: David Harris
  version: "1.0"
  status: draft

slides:
  - type: title
    id: title_slide
    title: EOS Quarterly Rocks
    subtitle: Priorities for the Quarter

  - type: section
    id: company_rocks_section
    section_title: Company Rocks

  - type: bullets
    id: company_rocks
    title: Top Company Rocks
    bullets:
      - Launch pptgen Phase 1 MVP to pilot teams
      - Finalize template and YAML governance standards
      - Reduce manual deck preparation time by 50%
      - Establish AI-assisted authoring workflow adoption

  - type: section
    id: leadership_rocks_section
    section_title: Leadership Team Rocks

  - type: two_column
    id: leadership_rocks
    title: Functional Rocks
    left_content:
      - "Product: define roadmap and adoption targets"
      - "Engineering: implement rendering MVP"
      - "Operations: establish template management process"
    right_content:
      - "Analytics: create example deck library"
      - "Leadership: align EOS reporting cadence"
      - "Enablement: publish onboarding guides"

  - type: bullets
    id: success_criteria
    title: Quarter-End Success Criteria
    bullets:
      - MVP is live in GitHub with working examples
      - Pilot teams can generate decks without manual formatting
      - Documentation and skills are complete and usable
