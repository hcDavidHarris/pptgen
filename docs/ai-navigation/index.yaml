# pptgen AI Navigation Index
# Version: 1.0
#
# This file maps AI tasks to the key files, documentation, and architecture
# components relevant to each task. It helps AI assistants quickly locate the
# right files without reading the entire codebase.
#
# Use this index when:
#   - starting a new development task
#   - looking for the right playbook or example pattern
#   - diagnosing validation or rendering failures
#   - deciding which file to modify for a given change type

version: "1.0"

# ---------------------------------------------------------------------------
# Task → File Mappings
# ---------------------------------------------------------------------------

tasks:

  generate_presentation_pipeline:
    description: Run the full text-to-PPTX generation pipeline via CLI or API
    primary_files:
      - src/pptgen/pipeline/generation_pipeline.py
      - src/pptgen/cli/generate.py
    reference_files:
      - docs/architecture/system_overview.md
      - docs/guides/getting_started.md
    cli_command: "pptgen generate <file.txt>"
    api_endpoint: "POST /v1/generate"

  generate_batch:
    description: Process a directory of input files into multiple PPTX outputs
    primary_files:
      - src/pptgen/cli/generate_batch.py
    cli_command: "pptgen generate-batch <dir/>"

  use_connector:
    description: Normalize structured source files (ADO, transcripts, metrics) for the pipeline
    primary_files:
      - src/pptgen/connectors/connector_factory.py
      - src/pptgen/connectors/ado_connector.py
      - src/pptgen/connectors/transcript_connector.py
      - src/pptgen/connectors/metrics_connector.py
    cli_command: "pptgen ingest <type> <file>"
    reference_files:
      - docs/architecture/system_overview.md

  export_artifacts:
    description: Export pipeline intermediate objects (spec, plan, deck definition) to JSON
    primary_files:
      - src/pptgen/artifacts/artifact_writer.py
    cli_flag: "--artifacts"
    api_field: "artifacts: true"
    output_files:
      - spec.json
      - slide_plan.json
      - deck_definition.json

  configure_runtime:
    description: Configure pptgen via environment variables or RuntimeSettings
    primary_files:
      - src/pptgen/config/settings.py
    reference_files:
      - docs/architecture/configuration.md
      - docs/development/operations_runbook.md
    notes:
      - All env vars use the PPTGEN_ prefix
      - Settings are a frozen singleton — use override_settings() in tests only

  inspect_run_metadata:
    description: Access per-run metadata (run_id, stage timings, config fingerprint)
    primary_files:
      - src/pptgen/runtime/run_context.py
    notes:
      - Pass run_context=RunContext() to generate_presentation() to capture timings
      - Use ctx.as_dict() for JSON-serializable structured logging

  manage_workspaces:
    description: Create, retrieve, or clean up per-run workspace directories
    primary_files:
      - src/pptgen/runtime/workspace.py
    reference_files:
      - docs/development/operations_runbook.md
    notes:
      - WorkspaceManager.from_settings(get_settings()) is the standard factory
      - cleanup_older_than(hours) prunes stale workspaces by mtime

  startup_validation:
    description: Run or extend pre-flight startup checks
    primary_files:
      - src/pptgen/runtime/startup.py
    notes:
      - assert_startup_healthy() is fatal (used in API lifespan)
      - validate_startup() is non-fatal (used in CLI)

  call_api:
    description: Use the pptgen REST API to generate presentations programmatically
    primary_files:
      - src/pptgen/api/routes.py
      - src/pptgen/api/schemas.py
      - src/pptgen/api/server.py
    reference_files:
      - docs/architecture/api_and_service_layer.md
    start_command: "uvicorn pptgen.api.server:app --reload"
    docs_url: "http://localhost:8000/docs"

  use_web_ui:
    description: Use the browser-based UI to preview, generate, and download presentations
    primary_files:
      - web/src/App.tsx
      - web/src/api.ts
      - web/src/components/GenerateForm.tsx
      - web/src/components/ResultPanel.tsx
    start_command: "cd web && npm run dev"
    reference_files:
      - docs/guides/getting_started.md

  generate_deck_yaml:
    description: Generate a pptgen YAML deck from notes, outlines, or structured input
    primary_files:
      - skills/generate_pptgen_deck_yaml_skill.md
      - docs/authoring/ai_generation_rules.md
      - docs/ai-playbooks/routing_table.yaml
    reference_files:
      - docs/authoring/slide_type_reference.md
      - docs/architecture/authoring_contract.md
    example_patterns:
      - examples/engineering_delivery/weekly_delivery_update.yaml
      - examples/eos/eos_rocks.yaml
      - examples/devops/devops_metrics.yaml
    default_template: ops_review_v1

  validate_deck_yaml:
    description: Validate a pptgen YAML deck for schema compliance and quality
    primary_files:
      - skills/validate_pptgen_deck_yaml_skill.md
      - src/pptgen/validators/deck_validator.py
    reference_files:
      - docs/architecture/authoring_contract.md
      - schemas/deck.schema.json
    cli_command: "pptgen validate --input <deck.yaml>"
    explain_flag: "pptgen validate --input <deck.yaml> --explain"

  improve_deck_yaml:
    description: Improve slide quality, titles, and flow of an existing YAML deck
    primary_files:
      - skills/improve_pptgen_deck_yaml.md
    reference_files:
      - docs/authoring/yaml_authoring_guide.md
      - docs/authoring/slide_type_reference.md

  build_deck:
    description: Render a validated YAML deck to a PowerPoint file
    primary_files:
      - src/pptgen/render/deck_renderer.py
      - src/pptgen/render/slide_renderers.py
    reference_files:
      - src/pptgen/render/placeholder_mapper.py
      - src/pptgen/slide_registry.py
    cli_command: "pptgen build --input <deck.yaml>"

  add_slide_type:
    description: Implement a new slide type in the rendering engine
    files_to_modify:
      - src/pptgen/models/slides.py
      - src/pptgen/render/slide_renderers.py
      - src/pptgen/render/deck_renderer.py
      - src/pptgen/slide_registry.py
      - templates/registry.yaml
    reference_files:
      - docs/ARCHITECTURE_MAP.md
      - docs/template_placeholder_inventory.md
    order:
      - Add Pydantic model to models/slides.py, add to SlideUnion
      - Add renderer function to slide_renderers.py, register in SLIDE_RENDERERS
      - Add layout name to SLIDE_TYPE_TO_LAYOUT in deck_renderer.py
      - Add placeholder idx map to _SLIDE_TYPE_PH_NAMES in deck_renderer.py
      - Add SlideTypeSpec to slide_registry.py
      - Add layout to template .pptx file
      - Update supported_slide_types in templates/registry.yaml

  add_template:
    description: Register a new PowerPoint template
    files_to_modify:
      - templates/registry.yaml
    reference_files:
      - docs/template_placeholder_inventory.md
      - docs/standards/template_authoring_standard.md
      - docs/standards/template_validation_checklist.md
    notes:
      - Keep separate template IDs even when backed by the same .pptx
      - Place template file at templates/<template_id>/template.pptx
      - Run template contract validator after adding

  add_cli_command:
    description: Add a new CLI command to the pptgen tool
    files_to_modify:
      - src/pptgen/cli/<new_module>.py
      - src/pptgen/cli/__init__.py
    reference_files:
      - src/pptgen/cli/workspace_init.py
      - src/pptgen/cli/example_commands.py
    notes:
      - Create a new Typer sub-app in src/pptgen/cli/<module>.py
      - Register with app.add_typer() in cli/__init__.py
      - Avoid Unicode characters in echo output (Windows cp1252 terminal)

  add_playbook:
    description: Add a new AI playbook route for a new input type
    files_to_modify:
      - docs/ai-playbooks/routing_table.yaml
      - docs/ai-playbooks/<new-playbook>.md
    reference_files:
      - docs/ai-playbooks/README.md
      - docs/ai-playbooks/ado-summary-to-weekly-delivery.md
    notes:
      - Add a new example YAML in examples/ to serve as the pattern
      - Validate the example with pptgen validate before committing

  add_example:
    description: Add a new reference YAML example to the example library
    action:
      - Create YAML in examples/<library>/<name>.yaml
      - Run pptgen validate --input examples/<library>/<name>.yaml
      - Update docs/examples/example_index.md
      - Update examples/catalog.yaml if needed
    rules:
      - All examples must pass pptgen validate with no errors
      - Quote version, metric values, and colon-containing list items
      - Use ops_review_v1 as default template unless the example is library-specific

  diagnose_validation_error:
    description: Understand and fix a pptgen validation error
    primary_files:
      - src/pptgen/validators/deck_validator.py
      - src/pptgen/cli/validation_explain.py
    reference_files:
      - docs/architecture/authoring_contract.md
      - docs/authoring/slide_type_reference.md
    cli_help: "pptgen validate --input <deck.yaml> --explain"
    common_errors:
      - "template not registered: change deck.template to a registered ID (pptgen list-templates)"
      - "Input should be a valid string: quote list items containing colons"
      - "maximum 4 metrics: split metric_summary into two slides"
      - "Extra inputs are not permitted: remove unrecognised YAML field"
      - "Field required: add the missing field (see slide_type_reference.md)"

# ---------------------------------------------------------------------------
# Documentation Locations
# ---------------------------------------------------------------------------

documentation:

  architecture:
    - path: docs/ARCHITECTURE_MAP.md
      purpose: Full platform architecture reference — read this first
    - path: docs/architecture/system_overview.md
      purpose: Platform overview — pipeline, interfaces, connectors, data models
    - path: docs/architecture/data_models.md
      purpose: Field-level reference for all pipeline data models
    - path: docs/architecture/api_and_service_layer.md
      purpose: API endpoints, request/response contracts, error shapes, CORS
    - path: docs/architecture/configuration.md
      purpose: All RuntimeSettings fields, env var names, profile behaviors, test isolation
    - path: docs/architecture/system_map.md
      purpose: Workspace and AI-assisted authoring workflow maps
    - path: docs/architecture/authoring_contract.md
      purpose: Canonical YAML field and schema rules

  authoring:
    - path: docs/authoring/yaml_authoring_guide.md
      purpose: Manual YAML authoring guide with examples
    - path: docs/authoring/ai_generation_rules.md
      purpose: Rules Claude must follow when generating deck YAML
    - path: docs/authoring/slide_type_reference.md
      purpose: Per-type field reference

  workspace:
    - path: docs/workspace/quickstart.md
      purpose: First-deck workflow quickstart
    - path: docs/workspace/workflow_runbook.md
      purpose: Step-by-step operational workflow procedures
    - path: docs/workspace/workspace_model.md
      purpose: Workspace directory structure and naming conventions

  ai_playbooks:
    - path: docs/ai-playbooks/routing_table.yaml
      purpose: Input type → playbook → example pattern routing table
    - path: docs/ai-playbooks/README.md
      purpose: Playbook index and workflow overview
    - path: docs/ai-playbooks/examples/
      purpose: End-to-end playbook worked examples

  examples:
    - path: docs/examples/example_index.md
      purpose: Scenario → example file mapping table
    - path: examples/catalog.yaml
      purpose: Machine-readable example catalogue

  standards:
    - path: docs/standards/deck_yaml_schema_specification.md
      purpose: Formal YAML content schema specification
    - path: docs/standards/template_authoring_standard.md
      purpose: Rules for building PowerPoint templates
    - path: docs/standards/template_validation_checklist.md
      purpose: Checklist for validating template quality
    - path: docs/template_placeholder_inventory.md
      purpose: Official placeholder naming contract per layout

  guides:
    - path: docs/guides/getting_started.md
      purpose: Onboarding — run CLI, API, and UI from scratch
    - path: docs/guides/how_decks_are_built.md
      purpose: Full pipeline walkthrough from input to .pptx
    - path: docs/guides/repository_guide.md
      purpose: YAML authoring — where templates, schemas, examples live
    - path: docs/development/repository_guide.md
      purpose: Developer navigation — pipeline, API, connectors, UI, tests
    - path: docs/development/operations_runbook.md
      purpose: Startup validation, workspace cleanup, environment setup, log patterns, failure scenarios

# ---------------------------------------------------------------------------
# Key Architecture Files
# ---------------------------------------------------------------------------

key_architecture_files:

  models:
    - src/pptgen/models/deck.py        # DeckFile, DeckMetadata
    - src/pptgen/models/slides.py      # All slide models, SlideUnion

  pipeline:
    - src/pptgen/loaders/yaml_loader.py           # YAML load + Pydantic parse
    - src/pptgen/validators/deck_validator.py      # Semantic validation
    - src/pptgen/render/deck_renderer.py           # PPTX orchestration
    - src/pptgen/render/slide_renderers.py         # Per-type render functions
    - src/pptgen/render/placeholder_mapper.py      # Shape name resolution

  registry:
    - src/pptgen/slide_registry.py                 # Slide type metadata
    - src/pptgen/registry/registry.py              # Template registry loader
    - templates/registry.yaml                      # Template registry file

  validation:
    - src/pptgen/template_contract_validator.py    # Template .pptx contract check
    - schemas/deck.schema.json                     # JSON Schema for external tooling

  cli:
    - src/pptgen/cli/__init__.py                   # Main app + build/validate commands
    - src/pptgen/cli/deck_scaffold.py              # pptgen deck scaffold
    - src/pptgen/cli/template_inspect.py           # pptgen template inspect
    - src/pptgen/cli/example_commands.py           # pptgen example list/show/copy
    - src/pptgen/cli/workspace_init.py             # pptgen workspace init
    - src/pptgen/cli/validation_explain.py         # Error/warning explanations

  config:
    - src/pptgen/config/settings.py                # RuntimeSettings, Profile, get_settings()
    - src/pptgen/config/__init__.py                # Public config API

  runtime:
    - src/pptgen/runtime/run_context.py            # RunContext, StageTimer
    - src/pptgen/runtime/workspace.py              # WorkspaceManager, Workspace
    - src/pptgen/runtime/startup.py                # validate_startup, assert_startup_healthy

  errors:
    - src/pptgen/errors/__init__.py                # PptgenError hierarchy + ErrorCategory

  pipeline:
    - src/pptgen/pipeline/generation_pipeline.py   # Main orchestrator (text → .pptx)
    - src/pptgen/input_router/                      # Input classification → playbook_id
    - src/pptgen/playbook_engine/                   # Deterministic and AI executors
    - src/pptgen/planner/                           # SlidePlan construction
    - src/pptgen/spec/spec_to_deck.py               # SlidePlan → deck_definition
    - src/pptgen/artifacts/artifact_writer.py       # Artifact export

  connectors:
    - src/pptgen/connectors/connector_factory.py    # Type → connector registry
    - src/pptgen/connectors/ado_connector.py        # Azure DevOps sprint JSON
    - src/pptgen/connectors/transcript_connector.py # Meeting transcript text
    - src/pptgen/connectors/metrics_connector.py    # DORA/DevOps metrics JSON

  api:
    - src/pptgen/api/server.py                      # FastAPI app + CORS
    - src/pptgen/api/routes.py                      # /v1/* endpoint definitions
    - src/pptgen/api/file_routes.py                 # /v1/files/download
    - src/pptgen/api/schemas.py                     # Pydantic request/response models
    - src/pptgen/api/service.py                     # Business logic layer

  web_ui:
    - web/src/App.tsx                               # Root state + API calls
    - web/src/api.ts                                # Typed API client
    - web/src/types.ts                              # TypeScript types
    - web/src/components/GenerateForm.tsx           # Input form
    - web/src/components/ResultPanel.tsx            # Result display + download
