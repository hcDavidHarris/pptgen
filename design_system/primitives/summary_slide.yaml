    required: true
    content_type: string
    maps_to: content
    description: "Summary heading"
  key_points:
    required: true
    content_type: list
    maps_to: content
    description: "Key takeaway points"
  next_steps:
    required: false
    content_type: list
    maps_to: content
    description: "Optional next steps or actions"
