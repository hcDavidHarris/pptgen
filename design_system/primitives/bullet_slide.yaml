schema_version: 1
primitive_id: bullet_slide
version: 1.0.0
layout_id: single_column
constraints:
  allow_extra_content: false
slots:
  title:
    required: true
    content_type: string
    maps_to: content
    description: "Slide heading"
  bullets:
    required: true
    content_type: list
    maps_to: content
    description: "Bullet point items"
  body:
    required: false
    content_type: string
    maps_to: content
    description: "Optional supporting narrative text"
